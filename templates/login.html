<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocker - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">📈 Stocker</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register" class="btn-primary">Register</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome Back 👋</h2>
            <p>Login to your Stocker account</p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button onclick="handleLogin()" class="btn-primary btn-full">Login</button>

            <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;

            if (!email || !password) {
                alert('Please fill in all fields!');
                return;
            }

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/login';

            const emailInput = document.createElement('input');
            emailInput.name = 'email';
            emailInput.value = email;

            const passInput = document.createElement('input');
            passInput.name = 'password';
            passInput.value = password;

            form.appendChild(emailInput);
            form.appendChild(passInput);
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
