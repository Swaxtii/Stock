<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocker - Register</title>
    <link rel="stylesheet" href="/static/css/style.css"></head>

<body>
    <nav class="navbar">
        <div class="logo">📈 Stocker</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login" class="btn-primary">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Account 🚀</h2>
            <p>Join Stocker and start trading today</p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm your password" required>
            </div>

            <button onclick="handleRegister()" class="btn-primary btn-full">Create Account</button>

            <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script>
        function handleRegister() {
            const username = document.querySelector('input[name="username"]').value;
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;
            const confirm = document.querySelector('input[name="confirm_password"]').value;

            if (!username || !email || !password || !confirm) {
                alert('Please fill in all fields!');
                return;
            }

            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters!');
                return;
            }

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/register';

            const fields = { username, email, password };
            Object.entries(fields).forEach(([name, value]) => {
                const input = document.createElement('input');
                input.name = name;
                input.value = value;
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>

</html>
